services:
  postgres:
    image: postgres:16
    container_name: fuelpos-postgres
    environment:
      POSTGRES_DB: fuelpos
      POSTGRES_USER: fuelpos
      POSTGRES_PASSWORD: fuelpos
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fuelpos -d fuelpos"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - fuelpos_pgdata:/var/lib/postgresql/data

volumes:
  fuelpos_pgdata:
